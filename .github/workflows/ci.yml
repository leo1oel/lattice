name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build

  rust:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      # cargo test/clippy compile the Tauri app, whose build script requires the
      # `externalBin` agent sidecar to exist. The tests never execute it, so an
      # empty stub satisfies the check without downloading the real binary
      # (that only happens for real bundles via `beforeBuildCommand`).
      - name: Stub the agent sidecar for compilation
        run: |
          mkdir -p src-tauri/binaries
          touch src-tauri/binaries/lattice-agent-aarch64-apple-darwin
          chmod +x src-tauri/binaries/lattice-agent-aarch64-apple-darwin
      - run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check
      - run: cargo test --manifest-path src-tauri/Cargo.toml
      - run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets --all-features -- -D warnings
