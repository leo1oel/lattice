name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build

  rust:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      # cargo test/clippy compile the Tauri app, whose build script validates the
      # `externalBin` sidecar and `resources` globs exist. The tests never use
      # them, so empty stubs satisfy the checks without downloading the real
      # agent (that only happens for real bundles via `beforeBuildCommand`).
      - name: Stub the agent sidecar and assets for compilation
        run: |
          mkdir -p src-tauri/binaries src-tauri/omp-assets
          touch src-tauri/binaries/lattice-agent-aarch64-apple-darwin
          chmod +x src-tauri/binaries/lattice-agent-aarch64-apple-darwin
          echo stub > src-tauri/omp-assets/placeholder.txt
      - run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check
      - run: cargo test --manifest-path src-tauri/Cargo.toml
      - run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets --all-features -- -D warnings
